<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>bio info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="bio information by privatyz."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="page">
      <section class="card">
        <header class="card__header">
          <div class="avatar">
            <div class="avatar__ring"></div>
            <div class="avatar__inner">
              <img src="img/image.jpg" alt="Avatar of PRIVATYZ" class="avatar__img" />
            </div>
          </div>
          <div class="title-block">
            <h1 class="title-block__name">Hello, I am P R I V A T Y Z</h1>
            <p class="title-block__role">Frontend / Lua / Python Developer</p>
          </div>
        </header>

        <section class="card__bio">
          <div class="typewriter">
            <span id="typewriter-text"></span>
            <span class="typewriter__cursor"></span>
          </div>
        </section>

        <section class="card__details">
          <div class="detail">
            <span class="detail__label">Город</span>
            <span class="detail__value">Горно-Алтайск</span>
          </div>
          <div class="detail">
            <span class="detail__label">Интересы</span>
            <span class="detail__value">UI, Анимации, Оригинальность</span>
          </div>
        </section>

        <section class="card__game" aria-label="Мини игра Змейка" hidden data-secret="snake">
          <div class="game">
            <div class="game__header">
              <div class="game__title">
                <h2 class="game__h">Змейка</h2>
                <p class="game__sub">Стрелки / WASD. Пауза: Space.</p>
              </div>

              <div class="game__stats" aria-label="Статистика">
                <div class="game__stat">
                  <span class="game__stat-label">Счёт</span>
                  <span class="game__stat-value" id="snake-score">0</span>
                </div>
                <div class="game__stat">
                  <span class="game__stat-label">Лучший</span>
                  <span class="game__stat-value" id="snake-best">0</span>
                </div>
              </div>
            </div>

            <div class="game__body">
              <div class="game__canvas-wrap">
                <canvas id="snake-canvas" width="360" height="360" aria-label="Поле игры"></canvas>
                <div class="game__hint" id="snake-status" aria-live="polite">Нажми «Старт»</div>
              </div>

              <aside class="game__side">
                <div class="game__controls" aria-label="Управление">
                  <label class="game__label" for="snake-name">Имя</label>
                  <input
                    class="game__input"
                    id="snake-name"
                    type="text"
                    maxlength="16"
                    autocomplete="nickname"
                    placeholder="Player"
                  />

                  <div class="game__buttons">
                    <button class="chip" id="snake-start" type="button">Старт</button>
                    <button class="chip chip--ghost" id="snake-pause" type="button" disabled>Пауза</button>
                    <button class="chip chip--ghost" id="snake-reset" type="button">Сброс</button>
                  </div>
                </div>

                <div class="game__leaderboard" aria-label="Лидерборд">
                  <div class="game__lb-header">
                    <h3 class="game__lb-title">Лидерборд</h3>
                    <button class="chip chip--ghost" id="snake-clear" type="button">Очистить</button>
                  </div>
                  <ol class="game__lb-list" id="snake-leaderboard"></ol>
                </div>
              </aside>
            </div>
          </div>
        </section>

        <footer class="card__footer">
          <a
            class="chip"
            href="https://t.me/privatyzzz"
            target="_blank"
            rel="noreferrer"
          >
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M9.5 14.4 9.2 18a.9.9 0 0 0 .8.9.9.9 0 0 0 .8-.3l2-2.1 3.5 2.6a1.3 1.3 0 0 0 2-.8L21.9 5a1 1 0 0 0-1.3-1.1L3 11.6a1 1 0 0 0 .1 1.9l4.2 1.3 9.3-5.8-7.1 5.4Z"
                />
              </svg>
            </span>
            <span>Telegram</span>
          </a>
          <a
            class="chip"
            href="https://github.com/PRIVATYZ"
            target="_blank"
            rel="noreferrer"
          >
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 2C7 2 3 6 3 11c0 4 2.6 7.3 6.2 8.5.5.1.6-.2.6-.4v-1.5c-2.5.6-3-1.1-3-1.1-.4-1-1-1.3-1-1.3-.8-.5.1-.5.1-.5.9.1 1.3.9 1.3.9.8 1.3 2.1.9 2.6.7.1-.6.3-1 .5-1.2-2-.2-4-1-4-4.4 0-1 .4-1.9 1-2.6-.1-.2-.4-1.1.1-2.3 0 0 .8-.3 2.7 1a9 9 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.2.2 2.1.1 2.3.7.7 1 1.6 1 2.6 0 3.4-2.1 4.2-4 4.4.3.2.5.7.5 1.5v2.2c0 .3.1.6.6.4A9 9 0 0 0 21 11c0-5-4-9-9-9Z"
                />
              </svg>
            </span>
            <span>GitHub</span>
          </a>
          <a class="chip" href="https://steamcommunity.com/id/PRIVATYZZZ/" target="_blank" rel="noreferrer">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M5 4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5Zm2 2h10v6.9a5 5 0 1 1-10 0V6Zm5 3.2a3.8 3.8 0 0 0-3.8 3.8A3.8 3.8 0 0 0 12 16.8 3.8 3.8 0 0 0 15.8 13 3.8 3.8 0 0 0 12 9.2Z"
                />
              </svg>
            </span>
            <span>Steam</span>
          </a>
        </footer>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
